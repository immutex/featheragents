name: CI

on:
  workflow_call:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Run test suite
        # Some Bun tests mutate process.cwd()/env and are not file-concurrency safe.
        run: bun test --timeout 30000 --max-concurrency 1

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Build root packages
        run: bun run build

      - name: Install dashboard dependencies
        working-directory: featherkit-dashboard
        run: bun install --frozen-lockfile

      - name: Build dashboard
        working-directory: featherkit-dashboard
        run: bun run build
